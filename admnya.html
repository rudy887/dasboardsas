<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Soal - Admin Dashboard</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Config for Font -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom Scrollbar for better look on windows */
        ::-webkit-scrollbar {
            height: 8px;
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Resizer styling */
        th {
            position: relative;
        }
        .resizer {
            position: absolute;
            right: 0;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            transition: background 0.2s;
            border-right: 1px solid #e2e8f0;
        }
        .resizer:hover, .resizer:active {
            background: #3b82f6;
            border-right: none;
        }

        /* Sticky column styling to add shadow on scroll */
        .sticky-col {
            position: sticky;
            right: 0;
            z-index: 10;
        }
        
        .sticky-col::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: -5px;
            width: 5px;
            background: linear-gradient(to right, transparent, rgba(0,0,0,0.03));
            pointer-events: none;
        }

        /* Input transitions */
        input {
            transition: all 0.2s ease;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <div class="flex items-center justify-between mb-8 bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-xl hidden sm:block">
                    <i data-lucide="book-open"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-slate-800 tracking-tight">Manajemen Soal</h1>
                    <p class="text-sm text-slate-500 mt-1">Kelola URL ujian dan password mata pelajaran.</p>
                </div>
            </div>
            
            <a href="/dasboardsas" id="homeBtn" title="Kembali ke Dashboard"
               class="flex items-center gap-2 bg-slate-800 hover:bg-slate-900 transition-colors text-white py-2 px-4 rounded-xl shadow-sm font-medium text-sm">
                <i data-lucide="home" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Dashboard</span>
            </a>
        </div>

        <!-- TABLE CARD -->
        <div class="bg-white shadow-sm border border-slate-200 rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table id="myTable" class="min-w-full text-left border-collapse w-full">
                    <thead class="bg-slate-50 text-slate-600 text-sm border-b border-slate-200">
                        <tr>
                            <th class="py-4 px-4 font-semibold w-56 min-w-[200px] whitespace-nowrap">Mata Pelajaran<div class="resizer"></div></th>
                            <th class="py-4 px-4 font-semibold w-full min-w-[300px] whitespace-nowrap">Tautan URL<div class="resizer"></div></th>
                            <th class="py-4 px-4 font-semibold w-40 min-w-[140px] whitespace-nowrap">Password<div class="resizer"></div></th>
                            <th class="py-4 px-4 font-semibold w-36 min-w-[120px] sticky-col bg-slate-50 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm divide-y divide-slate-100">
                        <!-- Loading State -->
                        <tr>
                            <td colspan="4" class="p-8 text-center text-slate-400">
                                <i data-lucide="loader-2" class="animate-spin w-8 h-8 mx-auto mb-2 text-blue-500"></i>
                                Memuat data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbwxCATRhFQb7R-xJXS_YFMLxIebQ2jpdba076aULxJMNTmTafqr12dmTj6XGboEceF4nQ/exec";

        // INIT ICONS FOR STATIC HTML
        lucide.createIcons();

        // LOAD DATA
        function loadData() {
            fetch(API)
                .then(res => res.json())
                .then(res => {
                    let html = "";
                    const data = res.data;

                    if(Object.keys(data).length === 0) {
                        html = `<tr><td colspan="4" class="p-8 text-center text-slate-500">Data belum tersedia.</td></tr>`;
                    } else {
                        Object.keys(data).forEach(key => {
                            const d = data[key];

                            // Using transparent inputs by default (looks like text), changes style when editable
                            html += `
                            <tr class="hover:bg-slate-50 transition-colors group">
                                <td class="p-3">
                                    <input value="${key}" id="mapel-${d.row}" 
                                        class="w-full bg-transparent border border-transparent focus:outline-none px-3 py-2 rounded-lg text-slate-800 font-medium" readonly>
                                </td>

                                <td class="p-3">
                                    <input value="${d.url}" id="url-${d.row}" 
                                        class="w-full bg-transparent border border-transparent focus:outline-none px-3 py-2 rounded-lg text-blue-600 truncate" readonly>
                                </td>

                                <td class="p-3">
                                    <input value="${d.password}" id="password-${d.row}" 
                                        class="w-full bg-transparent border border-transparent focus:outline-none px-3 py-2 rounded-lg text-slate-600 font-mono" readonly>
                                </td>

                                <td class="p-3 sticky-col bg-white group-hover:bg-slate-50 transition-colors">
                                    <div class="flex justify-center gap-1" id="action-group-${d.row}">
                                        <button id="btn-${d.row}" onclick="editData('${d.row}')" title="Edit"
                                            class="text-slate-400 hover:text-blue-600 hover:bg-blue-50 p-2 rounded-lg transition-colors">
                                            <i data-lucide="pencil" class="w-5 h-5"></i>
                                        </button>
                                        <button id="del-${d.row}" onclick="deleteData('${d.row}')" title="Hapus"
                                            class="text-slate-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition-colors">
                                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                        });
                    }

                    document.getElementById("tableBody").innerHTML = html;
                    lucide.createIcons();
                })
                .catch(err => {
                    document.getElementById("tableBody").innerHTML = `
                        <tr><td colspan="4" class="p-8 text-center text-red-500">Gagal memuat data. Silakan refresh halaman.</td></tr>`;
                    lucide.createIcons();
                });
        }

        // EDIT MODE
        function editData(row) {
            const mapel = document.getElementById("mapel-" + row);
            const url = document.getElementById("url-" + row);
            const password = document.getElementById("password-" + row);
            const btn = document.getElementById("btn-" + row);
            const delBtn = document.getElementById("del-" + row);
            const actionGroup = document.getElementById("action-group-" + row);

            // Enable inputs
            const inputs = [mapel, url, password];
            inputs.forEach(input => {
                input.removeAttribute("readonly");
                input.classList.remove("bg-transparent", "border-transparent", "truncate", "text-blue-600");
                input.classList.add("bg-white", "border-blue-300", "focus:ring-2", "focus:ring-blue-100", "shadow-inner", "text-slate-800");
            });

            // Set focus to the first input
            mapel.focus();

            // Hide delete button during edit
            if(delBtn) delBtn.style.display = "none";

            // Change Edit button to Save
            btn.innerHTML = `<i data-lucide="check" class="w-5 h-5"></i>`;
            btn.title = "Simpan";
            btn.className = "text-green-600 bg-green-50 hover:bg-green-100 p-2 rounded-lg transition-colors shadow-sm";
            btn.onclick = function() {
                updateData(row, btn);
            };

            // Add Cancel button
            if (!document.getElementById("cancel-" + row)) {
                const cancelBtn = document.createElement("button");
                cancelBtn.id = "cancel-" + row;
                cancelBtn.title = "Batal";
                cancelBtn.className = "text-slate-500 bg-slate-100 hover:bg-slate-200 p-2 rounded-lg transition-colors shadow-sm";
                cancelBtn.innerHTML = `<i data-lucide="x" class="w-5 h-5"></i>`;
                cancelBtn.onclick = function() {
                    loadData(); // Reload to cancel edits
                };
                actionGroup.appendChild(cancelBtn);
            }

            lucide.createIcons();
        }

        // UPDATE
        function updateData(row, btnElement) {
            // Loading state on button
            btnElement.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>`;
            lucide.createIcons();

            const mapel = document.getElementById("mapel-" + row).value;
            const url = document.getElementById("url-" + row).value;
            const password = document.getElementById("password-" + row).value;

            fetch(API, {
                method: "POST",
                body: new URLSearchParams({
                    action: "update",
                    mapel, url, password, row
                })
            })
            .then(() => loadData())
            .catch(() => {
                alert("Gagal memperbarui data.");
                loadData();
            });
        }

        // DELETE
        function deleteData(row) {
            if (!confirm("Apakah Anda yakin ingin menghapus data ini?")) return;

            const delBtn = document.getElementById("del-" + row);
            delBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>`;
            lucide.createIcons();

            fetch(API, {
                method: "POST",
                body: new URLSearchParams({
                    action: "delete",
                    row
                })
            })
            .then(() => loadData())
            .catch(() => {
                alert("Gagal menghapus data.");
                loadData();
            });
        }

        // RESIZE COLUMN (Optimized)
        const table = document.getElementById("myTable");
        const ths = table.querySelectorAll("th");

        ths.forEach((th) => {
            const resizer = th.querySelector(".resizer");
            if (!resizer) return;

            let startX, startWidth;

            resizer.addEventListener("mousedown", (e) => {
                startX = e.pageX;
                startWidth = th.offsetWidth;

                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none'; // Prevent text selection while dragging

                document.onmousemove = (e) => {
                    let newWidth = startWidth + (e.pageX - startX);
                    if (newWidth > 80) {
                        th.style.width = newWidth + "px";
                        th.style.minWidth = newWidth + "px";
                    }
                };

                document.onmouseup = () => {
                    document.onmousemove = null;
                    document.onmouseup = null;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                };
            });
        });

        // INIT
        loadData();
    </script>

</body>
</html>
