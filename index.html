<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Soal Editor</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

<style>
body { 
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
}
.card {
  background: white;
  border-radius: 1.5rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  transition: .3s;
}
.card:hover {
  transform: translateY(-8px);
}

/* MODAL */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal-box {
  background: white;
  border-radius: 1.5rem;
  padding: 2rem;
  width: 90%;
  max-width: 400px;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn {
  from { transform: translateY(20px); opacity:0 }
  to { transform: translateY(0); opacity:1 }
}
</style>
</head>

<body class="font-sans text-slate-800">

<header class="fixed top-0 w-full bg-white shadow z-50">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
    <h1 class="text-2xl font-extrabold text-purple-600">Soal Editor</h1>
<a href="/admin.html" class="font-bold hover:text-purple-600 transition">
  🛠️ Operator
</a>  </div>
</header>

<main class="pt-24 max-w-7xl mx-auto px-4">

<h2 class="text-center text-4xl font-extrabold mb-10">
Dashboard Pengisian Soal
</h2>

<div id="mapelContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

</main>

<!-- MODAL -->
<div id="modal" class="modal-bg">
  <div class="modal-box text-center">
    <h3 class="text-xl font-bold mb-4">Masukkan Password</h3>

    <div class="relative mb-4">
      <input id="passwordInput" type="password"
        class="w-full border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500"
        placeholder="Password...">
      <i id="togglePass" class="fas fa-eye absolute right-3 top-4 cursor-pointer text-gray-500"></i>
    </div>

    <div class="flex gap-3">
      <button onclick="submitPassword()"
        class="flex-1 bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700">
        Buka
      </button>
      <button onclick="closeModal()"
        class="flex-1 bg-gray-300 py-2 rounded-lg font-bold">
        Batal
      </button>
    </div>

    <p id="errorMsg" class="text-red-500 mt-3 hidden">Password salah!</p>
  </div>
</div>

<script>
const MAPEL = [
  {id:"pai", nama:"Pendidikan Agama Islam", icon:"fa-mosque"},
  {id:"pak", nama:"Pendidikan Agama Kristen", icon:"fa-church"},
  {id:"pah", nama:"Pendidikan Agama Hindu", icon:"fa-om"},
  {id:"pancasila", nama:"Pendidikan Pancasila", icon:"fa-flag"},
  {id:"inggris", nama:"Bahasa Inggris", icon:"fa-globe"},
  {id:"indonesia", nama:"Bahasa Indonesia", icon:"fa-book"},
  {id:"matematika", nama:"Matematika", icon:"fa-square-root-alt"},
  {id:"ipa", nama:"IPA", icon:"fa-flask"},
  {id:"ips", nama:"IPS", icon:"fa-globe-asia"},
  {id:"senitari", nama:"Seni Tari", icon:"fa-palette"},
  {id:"pjok", nama:"PJOK", icon:"fa-running"},
  {id:"prakarya", nama:"Prakarya", icon:"fa-tools"},
  {id:"informatika", nama:"Informatika", icon:"fa-laptop-code"},
  {id:"bk", nama:"Bimbingan Konseling", icon:"fa-heart"},
  {id:"tolaki", nama:"Bahasa Tolaki", icon:"fa-comments"},
];

const container = document.getElementById("mapelContainer");

MAPEL.forEach(m => {
  container.innerHTML += `
  <div class="card p-5 text-center">
    <i class="fas ${m.icon} text-3xl text-purple-500 mb-3"></i>
    <h3 class="font-bold mb-4">${m.nama}</h3>
    <button id="${m.id}"
       class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:bg-purple-700 transition">
       Loading...
    </button>
  </div>`;
});

// API
const API_URL = "https://script.google.com/macros/s/AKfycbwxCATRhFQb7R-xJXS_YFMLxIebQ2jpdba076aULxJMNTmTafqr12dmTj6XGboEceF4nQ/exec";

let DATA = {};
let currentMapel = "";

fetch(API_URL)
  .then(res => res.json())
  .then(res => {

    if(res.status !== "success"){
      alert("Data gagal dimuat");
      return;
    }

    DATA = res.data;

    MAPEL.forEach(m => {
      const el = document.getElementById(m.id);

      if(DATA[m.id] && DATA[m.id].url){
        el.innerText = "Edit Soal";

        el.onclick = () => openModal(m.id);

      } else {
        el.innerText = "Belum tersedia";

        el.classList.remove("bg-purple-600","hover:bg-purple-700");
        el.classList.add("bg-gray-400","cursor-not-allowed");

        el.disabled = true;
      }
    });

  });

// modal
function openModal(id){
  currentMapel = id;
  document.getElementById("modal").style.display = "flex";
  document.getElementById("passwordInput").value = "";
  document.getElementById("errorMsg").classList.add("hidden");
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function submitPassword(){
  const input = document.getElementById("passwordInput").value;
  const item = DATA[currentMapel];

  if(input === item.password){
    window.open(item.url, "_blank");
    closeModal();
  } else {
    document.getElementById("errorMsg").classList.remove("hidden");
  }
}

// enter submit
document.getElementById("passwordInput").addEventListener("keypress", function(e){
  if(e.key === "Enter") submitPassword();
});

// toggle password
document.getElementById("togglePass").onclick = function(){
  const input = document.getElementById("passwordInput");
  input.type = input.type === "password" ? "text" : "password";
};
</script>

</body>
</html>
